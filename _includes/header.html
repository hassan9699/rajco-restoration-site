<header class="site-header">
  <div class="header-row">
    {% include brand-mark.html variant="header" %}
    <div class="header-actions">
      <nav class="main-nav" id="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <details>
          <summary{% if page.url contains '/services/' %} class="active"{% endif %}>Services ▾</summary>
          <div class="nav-dropdown">
            <a href="{{ '/services/' | relative_url }}">All Services</a>
            <a href="{{ '/services/concrete.html' | relative_url }}">Concrete</a>
            <a href="{{ '/services/brickwork.html' | relative_url }}">Brickwork</a>
            <a href="{{ '/services/painting.html' | relative_url }}">Painting</a>
            <a href="{{ '/services/waterproofing.html' | relative_url }}">Waterproofing</a>
            <a href="{{ '/services/construction.html' | relative_url }}">Exterior Construction</a>
            <a href="{{ '/services/interior-remodeling.html' | relative_url }}">Interior Remodeling</a>
          </div>
        </details>
        <details>
          <summary{% if page.url contains '/violations/' %} class="active"{% endif %}>Violations ▾</summary>
          <div class="nav-dropdown">
            <a href="{{ '/violations/' | relative_url }}">All Violations</a>
            <a href="{{ '/violations/sidewalk.html' | relative_url }}">DOT Sidewalk Violations</a>
            <a href="{{ '/violations/local-law-11.html' | relative_url }}">Local Law 11 / FISP</a>
            <a href="{{ '/violations/ecb.html' | relative_url }}">DOB ECB / OATH</a>
            <a href="{{ '/violations/hpd.html' | relative_url }}">HPD Housing</a>
          </div>
        </details>
        <a href="{{ '/about.html' | relative_url }}"{% if page.url == '/about.html' %} class="active"{% endif %}>About</a>
        <a href="{{ '/contact.html' | relative_url }}"{% if page.url == '/contact.html' %} class="active"{% endif %}>Contact</a>
      </nav>
      <a href="{{ '/contact.html' | relative_url }}" class="btn btn-primary header-cta">Free Estimate</a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </div>
  </div>
  <div class="brick-band"></div>
  <div class="brick-band brick-band--offset"></div>
  <div class="brick-band"></div>
</header>
